# Site Settings
title: "yfd6433162 | R&D Engineer Portfolio"
title_separator: "|"
subtitle: "Hyperspectral Imaging × FPGA Design × Technical Author"
name: "yfd6433162"
description: "R&D Engineer specializing in Hyperspectral Imaging and FPGA Design. Technical book author with 100+ copies sold."
url: "https://yfd6433162.github.io"
baseurl: "/portfolio"
repository: "yfd6433162/portfolio"

# Theme Settings
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "default" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# Site Author
author:
  name: "yfd6433162"
  # avatar: "/assets/images/profile.jpg"
  bio: "R&D Engineer | Hyperspectral Imaging | FPGA Design | Technical Author (100+ Books Sold)"
  location: "Germany (on assignment)"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/yfd6433162"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:yfd6433162@gmail.com"

# Reading Files
include:
  - _pages

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Conversion
markdown: kramdown

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# Locale
locale: "ja-JP"
